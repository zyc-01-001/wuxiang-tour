<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>八路军太行纪念馆 · AR智能导览</title>
    <meta name="description" content="八路军太行纪念馆AR智能导览，通过AR技术沉浸式体验展品讲解">
    <link rel="canonical" href="https://wuxiang-tour.pages.dev/ar-demo.html">
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
                :root {
    /* 统一色彩 */
    --color-red: #c41e3a;
    --color-gold: #d4a853;
    --color-gold-light: #e8c97a;
    --color-dark: #1a1a2e;
    --color-dark-secondary: #16213e;
    --color-text-primary: #ffffff;
    --color-text-secondary: rgba(255,255,255,0.7);
    --color-text-muted: rgba(255,255,255,0.5);
    --color-bg-overlay: rgba(0,0,0,0.6);

    /* 统一字体 */
    --font-primary: 'PingFang SC', 'Noto Sans SC', 'Microsoft YaHei', 'Helvetica Neue', sans-serif;

    /* 统一圆角 */
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 20px;
    --radius-full: 50%;

    /* 统一间距 */
    --space-xs: 4px;
    --space-sm: 8px;
    --space-md: 16px;
    --space-lg: 24px;
    --space-xl: 32px;

    /* 统一过渡 */
    --transition-fast: 0.2s ease;
    --transition-normal: 0.3s ease;
    --transition-slow: 0.5s ease;

            --red-dark: #8b0000;
            --bg: #0a0a0a;
            --card-bg: rgba(0,0,0,0.85);
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: #fff;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        /* 摄像头背景 */
        #camera-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            z-index: 1;
            opacity: 0.4;
        }

        /* 扫描框 */
        .scan-frame {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 280px; height: 280px;
            border: 2px solid var(--color-gold);
            z-index: 10;
            pointer-events: none;
        }
        .scan-frame::before, .scan-frame::after {
            content: '';
            position: absolute;
            width: 30px; height: 30px;
            border-color: var(--color-red);
            border-style: solid;
        }
        .scan-frame::before { top: -2px; left: -2px; border-width: 3px 0 0 3px; }
        .scan-frame::after { bottom: -2px; right: -2px; border-width: 0 3px 3px 0; }
        .scan-line {
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--color-red), transparent);
            animation: scan 2s linear infinite;
        }
        @keyframes scan {
            0% { top: 0; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }

        /* 顶部标题 */
        .header {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 20;
            padding: 16px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            text-align: center;
        }
        .header h1 { font-size: 18px; font-weight: 700; }
        .header p { font-size: 12px; color: var(--color-gold); margin-top: 4px; }

        /* 状态提示 */
        .status-tip {
            position: fixed;
            top: 80px; left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            background: rgba(196,30,58,0.9);
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 13px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 1; }
        }

        /* 展品卡片列表 */
        .exhibit-bar {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            z-index: 30;
            background: linear-gradient(to top, rgba(0,0,0,0.95), rgba(0,0,0,0.7));
            padding: 16px;
            display: flex;
            gap: 12px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        .exhibit-card {
            flex-shrink: 0;
            width: 110px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(212,168,83,0.3);
            border-radius: 12px;
            padding: 12px 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .exhibit-card:active {
            transform: scale(0.95);
            background: rgba(196,30,58,0.3);
        }
        .exhibit-card .emoji { font-size: 32px; margin-bottom: 6px; }
        .exhibit-card .name { font-size: 13px; font-weight: 600; }
        .exhibit-card .tag {
            font-size: 10px;
            color: var(--color-gold);
            margin-top: 4px;
            background: rgba(212,168,83,0.15);
            padding: 2px 8px;
            border-radius: 10px;
            display: inline-block;
        }

        /* 讲解面板 */
        .detail-panel {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 100;
            background: rgba(0,0,0,0.92);
            backdrop-filter: blur(20px);
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
            overflow-y: auto;
        }
        .detail-panel.active { transform: translateY(0); }
        .panel-content {
            padding: 24px 20px 80px;
            max-width: 600px;
            margin: 0 auto;
        }
        .panel-close {
            position: absolute;
            top: 16px; right: 16px;
            width: 36px; height: 36px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            border: none;
            color: #fff;
            font-size: 20px;
            cursor: pointer;
        }
        .panel-emoji { font-size: 64px; text-align: center; margin-bottom: 8px; }
        .panel-title { font-size: 24px; font-weight: 700; text-align: center; margin-bottom: 4px; }
        .panel-type {
            text-align: center;
            color: var(--color-gold);
            font-size: 13px;
            margin-bottom: 20px;
        }
        .panel-section { margin-bottom: 16px; }
        .panel-section h3 {
            font-size: 15px;
            color: var(--color-red);
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .panel-section p {
            font-size: 14px;
            line-height: 1.7;
            color: rgba(255,255,255,0.85);
        }
        .voice-btn {
            width: 100%;
            padding: 14px;
            margin-top: 20px;
            background: linear-gradient(135deg, var(--color-red), var(--red-dark));
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .voice-btn:disabled { opacity: 0.5; }

        /* 开始遮罩 */
        .start-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 200;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
            text-align: center;
        }
        .start-overlay.hidden { display: none; }
        .start-overlay h2 { font-size: 22px; margin-bottom: 8px; }
        .start-overlay p { color: rgba(255,255,255,0.6); font-size: 14px; margin-bottom: 32px; }
        .start-btn {
            padding: 16px 48px;
            background: linear-gradient(135deg, var(--color-red), var(--red-dark));
            border: none;
            border-radius: 30px;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .note { margin-top: 24px; font-size: 12px; color: rgba(255,255,255,0.6); }
    </style>
</head>
<body style="padding-top:48px">
    <nav class="site-nav" aria-label="站点导航" style="position:fixed;top:0;left:0;right:0;z-index:9999;background:linear-gradient(135deg,rgba(196,30,58,0.95),rgba(26,26,46,0.95));backdrop-filter:blur(10px);padding:0 20px;height:48px;display:flex;align-items:center;box-shadow:0 2px 20px rgba(0,0,0,0.3);">
        <a href="index.html" style="color:var(--color-gold, #d4a853);font-size:15px;font-weight:600;text-decoration:none;display:flex;align-items:center;gap:6px;font-family:var(--font-primary,'PingFang SC','Noto Sans SC','Microsoft YaHei',sans-serif);">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
            返回首页
        </a>
        <span style="flex:1"></span>
        <span style="color:rgba(255,255,255,0.5);font-size:12px;font-family:var(--font-primary,'PingFang SC','Noto Sans SC','Microsoft YaHei',sans-serif);">八路军太行纪念馆 | 3D虚拟展厅</span>
    </nav>

    <!-- 摄像头背景 -->
    <video id="camera-bg" autoplay playsinline muted></video>

    <!-- 扫描框 -->
    <div class="scan-frame">
        <div class="scan-line"></div>
    </div>

    <!-- 顶部标题 -->
    <div class="header">
        <h1>🏛️ 八路军太行纪念馆</h1>
        <p>AR智能导览 · 点击展品或对准展品查看讲解</p>
    </div>

    <!-- 状态提示 -->
    <div class="status-tip">📷 请将展品对准扫描框，或点击下方卡片</div>

    <!-- 展品卡片 -->
    <div class="exhibit-bar" id="exhibitBar"></div>

    <!-- 讲解面板 -->
    <div class="detail-panel" id="detailPanel">
        <button class="panel-close" onclick="closePanel()">✕</button>
        <div class="panel-content" id="panelContent"></div>
    </div>

    <!-- 开始遮罩 -->
    <div class="start-overlay" id="startOverlay">
        <h2>🏛️ AR智能导览</h2>
        <p>八路军太行纪念馆 · 沉浸式讲解体验<br>点击开始，允许摄像头权限</p>
        <button class="start-btn" onclick="startAR()">开始体验</button>
        <div class="note">需要摄像头权限用于AR扫描</div>
    </div>

    <script>
        // ===== 展品数据 =====
        const exhibits = [
            {
                id: 'pot',
                name: '行军锅',
                emoji: '⚒️',
                type: '国家一级文物',
                appearance: '圆形直口宽平沿，锅底直径71厘米，通高49厘米，铁皮打制，底部和周围共钉有17块铁补丁，呈铁褐色。',
                history: '跟随红军完成长征，又随八路军东渡黄河。1938年长乐村战斗中，一位战士牺牲前紧紧抱着它不放。彭德怀嘱托："好好保存，待到全国解放后送进博物馆。"',
                spirit: '一口锅见证了红军长征的艰苦卓绝和八路军抗战的浴血奋战，17个补丁是革命艰辛最生动的注脚。'
            },
            {
                id: 'sandals',
                name: '叶成焕的草鞋',
                emoji: '🩴',
                type: '珍贵革命文物',
                appearance: '一双磨损严重的草鞋，草编鞋底已磨薄，棉线断裂，鞋面残破不堪。',
                history: '24岁八路军团长叶成焕牺牲时所穿。1938年长乐村战斗中头部中弹，临终最后一句话："队伍，队伍呢？"牺牲时年仅24岁。',
                spirit: '一双草鞋，承载着24岁铁血战将的赤诚与担当，"队伍呢"三个字重若千钧。'
            },
            {
                id: 'spoon',
                name: '胡春花的小木勺',
                emoji: '🥄',
                type: '革命文物',
                appearance: '一把手工制作的小木勺，勺柄有使用痕迹，木纹清晰可见，边缘圆润光滑。',
                history: '拥军模范胡春花为八路军伤员制作。她带领妇女们日夜操劳，为战士们缝补衣物、照顾伤员。武乡县12.5万人口中，有9万多人参加了抗日群众团体。',
                spirit: '一把木勺，述说军民鱼水情深。人民群众是八路军最坚强的后盾。'
            },
            {
                id: 'medical',
                name: '白求恩医药箱',
                emoji: '💊',
                type: '国际主义文物',
                appearance: '一个木质医药箱，箱体有磨损痕迹，铜制锁扣已氧化发黑。箱内曾装有手术器械和药品。',
                history: '加拿大医生白求恩在武乡砖壁村八路军总部使用。1939年因手术感染不幸逝世，年仅49岁。毛泽东写下《纪念白求恩》，称赞他"毫不利己专门利人"。',
                spirit: '毫不利己、专门利人——白求恩精神超越了国界和民族，成为人类共同的道德丰碑。'
            },
            {
                id: 'bugle',
                name: '崔振芳的军号',
                emoji: '🎺',
                type: '珍贵革命文物',
                appearance: '一把残缺的铜制军号，铜管布满弹痕，喇叭口扭曲变形，弯曲的手柄上五道指痕深嵌铜胎。',
                history: '19岁号兵崔振芳在黄崖洞保卫战使用。独自扛起两箱手榴弹，投出120余枚，炸死日军数十人。牺牲时手指仍紧扣军号，牙齿与号嘴熔铸在一起。',
                spirit: '一把残缺的军号，吹响了中华民族不屈的抗争。19岁的青春永远定格在太行山上。'
            },
            {
                id: 'pillar',
                name: '序厅铜柱',
                emoji: '🏛️',
                type: '纪念建筑',
                appearance: '8根镌刻八路军抗战画面的四方铜柱，巍然矗立于序厅中央。每根高约5米，表面刻有浮雕。',
                history: '走进序厅，首先映入眼帘的就是这8根铜柱。它们寓意中国共产党、八路军是中华民族的中流砥柱，记录从改编出师到抗战胜利的重要历史时刻。',
                spirit: '8根铜柱，8年抗战，中华民族的中流砥柱屹立于太行山上，永不磨灭。'
            }
        ];

        // ===== 初始化展品卡片 =====
        const bar = document.getElementById('exhibitBar');
        exhibits.forEach((item, idx) => {
            const card = document.createElement('div');
            card.className = 'exhibit-card';
            card.dataset.index = idx;
            card.innerHTML = `
                <div class="emoji">${item.emoji}</div>
                <div class="name">${item.name}</div>
                <div class="tag">${item.type}</div>
            `;
            bar.appendChild(card);
        });

        // 事件委托：展品卡片点击
        bar.addEventListener('click', (e) => {
            const card = e.target.closest('.exhibit-card');
            if (!card) return;
            const idx = parseInt(card.dataset.index, 10);
            if (idx >= 0 && idx < exhibits.length) {
                openPanel(exhibits[idx], idx);
            }
        });

        // ===== 摄像头 =====
        let stream = null;
        async function startAR() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment' },
                    audio: false
                });
                document.getElementById('camera-bg').srcObject = stream;
                document.getElementById('startOverlay').classList.add('hidden');
            } catch (e) {
                alert('摄像头权限被拒绝，您仍可点击展品卡片查看讲解。');
                document.getElementById('startOverlay').classList.add('hidden');
            }
        }

        // ===== 讲解面板 =====
        function openPanel(item, idx) {
            const panel = document.getElementById('detailPanel');
            const content = document.getElementById('panelContent');
            content.innerHTML = `
                <div class="panel-emoji">${item.emoji}</div>
                <div class="panel-title">${item.name}</div>
                <div class="panel-type">${item.type}</div>
                <div class="panel-section">
                    <h3>📋 外观描述</h3>
                    <p>${item.appearance}</p>
                </div>
                <div class="panel-section">
                    <h3>📖 历史背景</h3>
                    <p>${item.history}</p>
                </div>
                <div class="panel-section">
                    <h3>⭐ 精神内涵</h3>
                    <p>${item.spirit}</p>
                </div>
                <button class="voice-btn speak-btn" data-speak-index="${idx}">
                    🔊 语音朗读讲解
                </button>
            `;
            panel.classList.add('active');
        }

        function closePanel() {
            document.getElementById('detailPanel').classList.remove('active');
            window.speechSynthesis.cancel();
        }

        // ===== 语音朗读 =====
        let speaking = false;

        // 事件委托：语音朗读按钮
        document.getElementById('detailPanel').addEventListener('click', (e) => {
            const btn = e.target.closest('.speak-btn');
            if (!btn) return;
            const idx = parseInt(btn.dataset.speakIndex, 10);
            if (idx >= 0 && idx < exhibits.length) {
                const item = exhibits[idx];
                speak(item.name + '。外观描述：' + item.appearance + '。历史背景：' + item.history + '。精神内涵：' + item.spirit);
            }
        });

        function speak(text) {
            if (!window.speechSynthesis) {
                alert('您的浏览器不支持语音朗读');
                return;
            }
            window.speechSynthesis.cancel();
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'zh-CN';
            utter.rate = 0.9;
            utter.pitch = 1;
            window.speechSynthesis.speak(utter);
        }

        // ===== 随机模拟AR识别 =====
        // 每5秒随机高亮一个卡片，模拟"识别到展品"
        setInterval(() => {
            if (Math.random() > 0.7) {
                const cards = document.querySelectorAll('.exhibit-card');
                const idx = Math.floor(Math.random() * cards.length);
                cards[idx].style.borderColor = 'var(--color-red)';
                cards[idx].style.background = 'rgba(196,30,58,0.2)';
                setTimeout(() => {
                    cards[idx].style.borderColor = '';
                    cards[idx].style.background = '';
                }, 1500);
            }
        }, 5000);

        // 返回键关闭面板
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closePanel();
        });
    </script>
</body>
</html>
