<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D场景导览演示 - 武乡红色文旅</title>
    <meta name="description" content="武乡红色文旅3D场景导览演示，沉浸式体验太行抗战历史">
    <link rel="canonical" href="https://wuxiang-tour.pages.dev/scene3d.html">
    <style>
        /* ========== 全局重置与变量 ========== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
                :root {
    /* 统一色彩 */
    --color-red: #c41e3a;
    --color-gold: #d4a853;
    --color-gold-light: #e8c97a;
    --color-dark: #1a1a2e;
    --color-dark-secondary: #16213e;
    --color-text-primary: #ffffff;
    --color-text-secondary: rgba(255,255,255,0.7);
    --color-text-muted: rgba(255,255,255,0.5);
    --color-bg-overlay: rgba(0,0,0,0.6);

    /* 统一字体 */
    --font-primary: 'PingFang SC', 'Noto Sans SC', 'Microsoft YaHei', 'Helvetica Neue', sans-serif;

    /* 统一圆角 */
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 20px;
    --radius-full: 50%;

    /* 统一间距 */
    --space-xs: 4px;
    --space-sm: 8px;
    --space-md: 16px;
    --space-lg: 24px;
    --space-xl: 32px;

    /* 统一过渡 */
    --transition-fast: 0.2s ease;
    --transition-normal: 0.3s ease;
    --transition-slow: 0.5s ease;

            --bg-primary: #0a0a0a;
            --red-dark: #9a1830;
            --border-subtle: rgba(255,255,255,0.08);
        }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Noto Sans SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg-primary);
            color: var(--color-text-primary);
            -webkit-font-smoothing: antialiased;
            touch-action: none;
        }
        a { color: inherit; text-decoration: none; }

        /* ========== 加载进度条 ========== */
        .loading-bar-container {
            position: fixed; top: 0; left: 0; right: 0;
            height: 4px; background: rgba(255,255,255,0.05);
            z-index: 100000;
        }
        .loading-bar {
            height: 100%; width: 0%;
            background: linear-gradient(90deg, var(--color-red), var(--color-gold));
            transition: width 0.3s ease;
        }
        .loading-overlay {
            position: fixed; inset: 0;
            background: var(--bg-primary);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 99999;
            transition: opacity 0.6s ease, visibility 0.6s ease;
        }
        .loading-overlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        .loader-ring {
            width: 50px; height: 50px;
            border: 3px solid rgba(196,30,58,0.15);
            border-top-color: var(--color-red);
            border-right-color: var(--color-gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        .loader-text { font-size: 14px; color: var(--color-text-muted); letter-spacing: 3px; }
        .loader-percent { font-size: 28px; font-weight: 700; color: var(--color-gold); margin-bottom: 8px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ========== 开始界面 ========== */
        .start-overlay {
            position: fixed; inset: 0;
            background: linear-gradient(135deg, rgba(10,10,10,0.97), rgba(20,5,5,0.97));
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 9000;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }
        .start-overlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        .start-title {
            font-size: 36px; font-weight: 800;
            background: linear-gradient(135deg, var(--color-red), var(--color-gold));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            letter-spacing: 2px;
        }
        .start-subtitle {
            font-size: 16px; color: var(--color-text-muted);
            margin-bottom: 40px;
            letter-spacing: 4px;
        }
        .start-controls {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: var(--radius-md);
            padding: 24px 36px;
            margin-bottom: 36px;
            text-align: center;
        }
        .start-controls .control-row {
            font-size: 14px; color: var(--color-text-secondary);
            margin-bottom: 8px;
            line-height: 1.8;
        }
        .start-controls .control-row:last-child { margin-bottom: 0; }
        .start-controls .key {
            display: inline-block;
            padding: 2px 10px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            color: var(--color-gold-light);
            margin: 0 2px;
        }
        .start-btn {
            padding: 16px 60px;
            background: linear-gradient(135deg, var(--color-red), var(--red-dark));
            border: none; border-radius: var(--radius-md);
            color: #fff; font-size: 18px; font-weight: 700;
            cursor: pointer;
            letter-spacing: 3px;
            transition: transform 0.2s, box-shadow 0.3s;
            box-shadow: 0 4px 24px rgba(196,30,58,0.3);
        }
        .start-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 32px rgba(196,30,58,0.5); }
        .start-btn:active { transform: scale(0.97); }
        .start-mobile-controls { display: none; }
        .start-desktop-controls { display: block; }

        /* ========== 3D画布容器 ========== */
        #scene-container {
            width: 100%; height: 100%;
            position: fixed; top: 0; left: 0;
        }
        #scene-container canvas { display: block; }

        /* ========== 准星 ========== */
        .crosshair {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 800;
            pointer-events: none;
            display: none;
        }
        .crosshair.visible { display: block; }
        .crosshair::before, .crosshair::after {
            content: '';
            position: absolute;
            background: rgba(255,255,255,0.7);
            border-radius: 1px;
        }
        .crosshair::before {
            width: 2px; height: 20px;
            top: -10px; left: -1px;
        }
        .crosshair::after {
            width: 20px; height: 2px;
            top: -1px; left: -10px;
        }
        .crosshair.active::before, .crosshair.active::after {
            background: var(--color-gold);
        }

        /* ========== 物品名称标签（准星下方） ========== */
        .item-label {
            position: fixed;
            top: calc(50% + 24px);
            left: 50%;
            transform: translateX(-50%);
            padding: 6px 16px;
            background: rgba(10,10,10,0.85);
            border: 1px solid var(--color-gold);
            border-radius: var(--radius-sm);
            font-size: 14px;
            color: var(--color-gold-light);
            pointer-events: none;
            z-index: 800;
            opacity: 0;
            transition: opacity 0.2s;
            white-space: nowrap;
            backdrop-filter: blur(8px);
        }
        .item-label.visible { opacity: 1; }

        /* ========== 交互提示 ========== */
        .interact-hint {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            padding: 8px 24px;
            background: rgba(10,10,10,0.8);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            font-size: 13px;
            color: var(--color-text-secondary);
            pointer-events: none;
            z-index: 800;
            opacity: 0;
            transition: opacity 0.25s;
            backdrop-filter: blur(8px);
        }
        .interact-hint.visible { opacity: 1; }
        .interact-hint .key-hint {
            display: inline-block;
            padding: 1px 8px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 3px;
            font-weight: 600;
            color: var(--color-gold-light);
            margin: 0 3px;
        }

        /* ========== 自动讲解条 ========== */
        .narration-bar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            max-width: 600px;
            width: 90%;
            padding: 12px 20px;
            background: rgba(10,10,10,0.85);
            border: 1px solid rgba(196,30,58,0.3);
            border-radius: var(--radius-md);
            font-size: 13px;
            color: var(--color-text-secondary);
            line-height: 1.6;
            pointer-events: none;
            z-index: 800;
            opacity: 0;
            transition: opacity 0.3s;
            backdrop-filter: blur(12px);
        }
        .narration-bar.visible { opacity: 1; }
        .narration-bar .nar-label {
            font-size: 11px;
            color: var(--color-red);
            font-weight: 600;
            margin-bottom: 4px;
            letter-spacing: 1px;
        }

        /* ========== 小地图 ========== */
        .minimap-container {
            position: fixed;
            top: 16px; left: 16px;
            z-index: 800;
            pointer-events: none;
            display: none;
        }
        .minimap-container.visible { display: block; }
        .minimap-border {
            width: 160px; height: 100px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: var(--radius-sm);
            overflow: hidden;
            background: rgba(10,10,10,0.7);
            backdrop-filter: blur(8px);
        }
        #minimapCanvas { display: block; }

        /* ========== HUD 右上角提示 ========== */
        .hud-esc {
            position: fixed;
            top: 16px; right: 16px;
            padding: 6px 14px;
            background: rgba(10,10,10,0.6);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: var(--radius-sm);
            font-size: 12px;
            color: var(--color-text-muted);
            z-index: 800;
            pointer-events: none;
            display: none;
            backdrop-filter: blur(8px);
        }
        .hud-esc.visible { display: block; }

        /* ========== 暂停菜单 ========== */
        .pause-overlay {
            position: fixed; inset: 0;
            background: rgba(10,10,10,0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 8500;
            opacity: 0; visibility: hidden;
            transition: opacity 0.3s, visibility 0.3s;
        }
        .pause-overlay.visible { opacity: 1; visibility: visible; }
        .pause-title {
            font-size: 28px; font-weight: 700;
            margin-bottom: 32px;
            color: var(--color-text-primary);
        }
        .pause-btn {
            display: block;
            width: 240px;
            padding: 14px 0;
            margin-bottom: 12px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: var(--radius-sm);
            color: var(--color-text-primary);
            font-size: 15px;
            cursor: pointer;
            text-align: center;
            transition: background 0.3s, border-color 0.3s;
        }
        .pause-btn:hover { background: rgba(196,30,58,0.2); border-color: var(--color-red); }
        .pause-btn.primary {
            background: linear-gradient(135deg, var(--color-red), var(--red-dark));
            border: none;
            font-weight: 600;
        }
        .pause-btn.primary:hover { opacity: 0.9; }
        .pause-controls-info {
            margin-top: 24px;
            padding: 16px 24px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: var(--radius-sm);
            font-size: 13px;
            color: var(--color-text-muted);
            line-height: 2;
            text-align: center;
        }

        /* ========== 讲解面板 ========== */
        .info-panel {
            position: fixed; top: 0; right: 0;
            width: 400px; height: 100vh;
            background: rgba(10,10,10,0.95);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-left: 1px solid rgba(212,168,83,0.2);
            z-index: 2000;
            transform: translateX(100%);
            transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
            overflow-y: auto;
            display: flex; flex-direction: column;
        }
        .info-panel.open { transform: translateX(0); }

        .panel-header {
            padding: 20px 24px 16px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            display: flex; align-items: center; justify-content: space-between;
            flex-shrink: 0;
        }
        .panel-header h3 {
            font-size: 20px; font-weight: 700;
            display: flex; align-items: center; gap: 10px;
        }
        .panel-close {
            width: 36px; height: 36px;
            border-radius: 50%;
            background: rgba(255,255,255,0.06);
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .panel-close:hover { background: rgba(196,30,58,0.3); }

        .panel-body {
            padding: 20px 24px;
            flex: 1;
            overflow-y: auto;
        }

        .panel-section { margin-bottom: 20px; }
        .panel-section-title {
            font-size: 11px; font-weight: 600;
            color: var(--color-red);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 8px;
            display: flex; align-items: center; gap: 6px;
        }
        .panel-section-title::before {
            content: ''; width: 12px; height: 2px;
            background: var(--color-red);
        }
        .panel-section p {
            font-size: 14px; line-height: 1.8;
            color: var(--color-text-secondary);
        }

        .panel-tag {
            display: inline-block;
            padding: 3px 10px;
            background: rgba(196,30,58,0.15);
            border: 1px solid rgba(196,30,58,0.3);
            border-radius: 20px;
            font-size: 12px;
            color: var(--color-red);
            margin-bottom: 16px;
        }

        /* 语音朗读按钮 */
        .btn-speak {
            display: flex; align-items: center; gap: 8px;
            padding: 10px 20px;
            background: linear-gradient(135deg, var(--color-red), var(--red-dark));
            border-radius: var(--radius-sm);
            color: #fff;
            font-size: 14px;
            cursor: pointer;
            border: none;
            transition: opacity 0.3s, transform 0.2s;
            width: 100%;
            justify-content: center;
        }
        .btn-speak:hover { opacity: 0.9; }
        .btn-speak:active { transform: scale(0.98); }
        .btn-speak.speaking { animation: pulse-speak 1.5s infinite; }
        @keyframes pulse-speak {
            0%, 100% { box-shadow: 0 0 0 0 rgba(196,30,58,0.4); }
            50% { box-shadow: 0 0 0 10px rgba(196,30,58,0); }
        }

        /* AI问答区域 */
        .panel-ai {
            border-top: 1px solid rgba(255,255,255,0.06);
            padding: 16px 24px 20px;
            flex-shrink: 0;
        }
        .panel-ai-title {
            font-size: 12px; color: var(--color-text-muted);
            margin-bottom: 10px;
            display: flex; align-items: center; gap: 6px;
        }
        .ai-chat-messages {
            max-height: 150px;
            overflow-y: auto;
            margin-bottom: 10px;
            font-size: 13px;
            line-height: 1.7;
        }
        .ai-chat-messages::-webkit-scrollbar { width: 4px; }
        .ai-chat-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
        .ai-msg {
            padding: 8px 12px;
            border-radius: var(--radius-sm);
            margin-bottom: 8px;
            max-width: 95%;
        }
        .ai-msg.bot {
            background: rgba(255,255,255,0.04);
            color: var(--color-text-secondary);
        }
        .ai-msg.user {
            background: rgba(196,30,58,0.15);
            color: var(--color-text-primary);
            margin-left: auto;
            text-align: right;
        }
        .ai-input-row { display: flex; gap: 8px; }
        .ai-input-row input {
            flex: 1;
            padding: 8px 14px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: var(--radius-sm);
            color: var(--color-text-primary);
            font-size: 13px;
            outline: none;
            transition: border-color 0.3s;
        }
        .ai-input-row input:focus { border-color: var(--color-gold); }
        .ai-input-row button {
            padding: 8px 16px;
            background: var(--color-red);
            border-radius: var(--radius-sm);
            color: #fff;
            font-size: 13px;
            cursor: pointer;
            border: none;
            white-space: nowrap;
            transition: background 0.3s;
        }
        .ai-input-row button:hover { background: var(--red-dark); }

        /* ========== 虚拟摇杆（手机端） ========== */
        .joystick-zone {
            position: fixed;
            bottom: 0;
            width: 50%;
            height: 40%;
            z-index: 750;
            display: none;
        }
        .joystick-zone.left { left: 0; }
        .joystick-zone.right { right: 0; }
        .joystick-base {
            position: absolute;
            width: 120px; height: 120px;
            border-radius: 50%;
            background: rgba(255,255,255,0.06);
            border: 2px solid rgba(255,255,255,0.12);
            display: none;
            pointer-events: none;
        }
        .joystick-thumb {
            position: absolute;
            width: 50px; height: 50px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            border: 2px solid rgba(255,255,255,0.3);
            display: none;
            pointer-events: none;
        }

        /* 手机端交互按钮 */
        .mobile-interact-btn {
            position: fixed;
            bottom: 50%;
            right: 20px;
            transform: translateY(50%);
            width: 60px; height: 60px;
            border-radius: 50%;
            background: rgba(196,30,58,0.6);
            border: 2px solid var(--color-red);
            color: #fff;
            font-size: 13px;
            font-weight: 600;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 800;
            cursor: pointer;
            backdrop-filter: blur(8px);
        }
        .mobile-interact-btn.visible { display: flex; }

        /* ========== 响应式 ========== */
        @media (max-width: 768px) {
            .info-panel { width: 100%; }
            .start-title { font-size: 24px; }
            .start-subtitle { font-size: 13px; margin-bottom: 24px; }
            .start-controls { padding: 16px 24px; margin-bottom: 24px; }
            .start-controls .control-row { font-size: 12px; }
            .start-btn { padding: 14px 40px; font-size: 16px; }
            .minimap-border { width: 120px; height: 75px; }
        }

        /* 检测触摸设备 */
        @media (pointer: coarse) {
            .start-mobile-controls { display: block; }
            .start-desktop-controls { display: none; }
        }
    </style>
</head>
<body>

<!-- ========== 加载界面 ========== -->
<div class="loading-overlay" id="loadingOverlay">
    <div class="loader-ring"></div>
    <div class="loader-percent" id="loaderPercent">0%</div>
    <div class="loader-text">正在加载3D场景...</div>
</div>
<div class="loading-bar-container">
    <div class="loading-bar" id="loadingBar"></div>
</div>

<!-- ========== 开始界面 ========== -->
<div class="start-overlay hidden" id="startOverlay">
    <div class="start-title">武乡红色文旅 · 3D场景导览</div>
    <div class="start-subtitle">教室模拟场景演示</div>
    <div class="start-controls">
        <div class="start-desktop-controls">
            <div class="control-row"><span class="key">W</span><span class="key">A</span><span class="key">S</span><span class="key">D</span> 移动 &nbsp;|&nbsp; 鼠标 环顾</div>
            <div class="control-row"><span class="key">E</span> 查看物品详情 &nbsp;|&nbsp; <span class="key">ESC</span> 暂停</div>
            <div class="control-row" style="margin-top:8px;color:var(--color-text-muted);font-size:12px;">靠近物品自动触发语音讲解</div>
        </div>
        <div class="start-mobile-controls">
            <div class="control-row">左侧摇杆 移动 &nbsp;|&nbsp; 右侧摇杆 视角</div>
            <div class="control-row">点击按钮 查看物品详情</div>
            <div class="control-row" style="margin-top:8px;color:var(--color-text-muted);font-size:12px;">靠近物品自动触发语音讲解</div>
        </div>
    </div>
    <button class="start-btn" id="startBtn">进入场景</button>
</div>

<!-- ========== 暂停菜单 ========== -->
<div class="pause-overlay" id="pauseOverlay">
    <div class="pause-title">导览暂停</div>
    <button class="pause-btn primary" id="resumeBtn">继续导览</button>
    <a href="index.html" class="pause-btn">返回主站</a>
    <div class="pause-controls-info">
        <span class="key" style="display:inline-block;padding:1px 8px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:4px;font-size:12px;font-weight:600;color:#e8c97a;">W</span>
        <span class="key" style="display:inline-block;padding:1px 8px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:4px;font-size:12px;font-weight:600;color:#e8c97a;">A</span>
        <span class="key" style="display:inline-block;padding:1px 8px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:4px;font-size:12px;font-weight:600;color:#e8c97a;">S</span>

// 游戏状态

let joystickRight = { active: false, dx: 0, dy: 0, touchId: null };

// ========== 加载进度模拟 ==========
let loadProgress = 0;
function updateLoading(progress) {
    loadProgress = Math.min(progress, 100);
    document.getElementById('loadingBar').style.width = loadProgress + '%';
    document.getElementById('loaderPercent').textContent = Math.floor(loadProgress) + '%';
    if (loadProgress >= 100) {
        setTimeout(() => {
            document.getElementById('loadingOverlay').classList.add('hidden');
            document.querySelector('.loading-bar-container').style.display = 'none';
            // 显示开始界面
            document.getElementById('startOverlay').classList.remove('hidden');
        }, 400);
    }
}

// ========== 初始化场景 ==========
function init() {
    updateLoading(10);

    // 创建场景
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB);
    scene.fog = new THREE.Fog(0x87CEEB, 25, 50);

    updateLoading(20);

    // 创建相机（第一人称视角）
    camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, PLAYER_HEIGHT, 4); // 站在门口，面朝教室内部

    updateLoading(30);

    // 创建渲染器
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    document.getElementById('scene-container').appendChild(renderer.domElement);

    updateLoading(40);

    // PointerLockControls（第一人称控制）
    controls = new THREE.PointerLockControls(camera, renderer.domElement);

    // 监听锁定/解锁事件
    controls.addEventListener('lock', () => {
        isLocked = true;
        isPaused = false;
        document.getElementById('pauseOverlay').classList.remove('visible');
        showHUD(true);
    });
    controls.addEventListener('unlock', () => {
        isLocked = false;
        // 如果不是面板打开导致的解锁，显示暂停菜单
        if (!isPanelOpen && isPlaying) {
            isPaused = true;
            document.getElementById('pauseOverlay').classList.add('visible');
        }
        showHUD(false);
    });

    updateLoading(50);

    // 射线投射器
    raycaster = new THREE.Raycaster();
    raycaster.far = 3; // 最大交互距离3米

    // 创建光照
    createLights();
    updateLoading(60);

    // 创建教室
    createClassroom();
    updateLoading(85);

    // 事件监听
    window.addEventListener('resize', onWindowResize);
    document.addEventListener('keydown', onKeyDown);
    document.addEventListener('keyup', onKeyUp);

    // 开始界面按钮
    document.getElementById('startBtn').addEventListener('click', startGame);
    document.getElementById('resumeBtn').addEventListener('click', resumeGame);

    // 面板关闭
    document.getElementById('panelClose').addEventListener('click', closePanel);

    // 手机端虚拟摇杆
    if (isMobile) {
        setupMobileControls();
    }

    updateLoading(100);

    // 开始渲染循环
    animate();
}

// ========== 显示/隐藏 HUD ==========
function showHUD(show) {
    const crosshair = document.getElementById('crosshair');
    const minimap = document.getElementById('minimapContainer');
    const hudEsc = document.getElementById('hudEsc');
    if (show) {
        crosshair.classList.add('visible');
        minimap.classList.add('visible');
        if (!isMobile) hudEsc.classList.add('visible');
    } else {
        crosshair.classList.remove('visible');
        minimap.classList.remove('visible');
        hudEsc.classList.remove('visible');
        document.getElementById('itemLabel').classList.remove('visible');
        document.getElementById('interactHint').classList.remove('visible');
    }
}

// ========== 开始游戏 ==========
function startGame() {
    document.getElementById('startOverlay').classList.add('hidden');
    isPlaying = true;

    if (isMobile) {
        // 手机端：显示虚拟摇杆
        document.getElementById('joystickLeftZone').style.display = 'block';
        document.getElementById('joystickRightZone').style.display = 'block';
        showHUD(true);
    } else {
        // 电脑端：请求锁定鼠标
        controls.lock();
    }
}

// ========== 继续游戏 ==========
function resumeGame() {
    document.getElementById('pauseOverlay').classList.remove('visible');
    if (isMobile) {
        showHUD(true);
    } else {
        controls.lock();
    }
}

// ========== 键盘按下 ==========
function onKeyDown(event) {
    if (!isPlaying) return;
    switch (event.code) {
        case 'KeyW': case 'ArrowUp':    moveState.forward = true; break;
        case 'KeyS': case 'ArrowDown':   moveState.backward = true; break;
        case 'KeyA': case 'ArrowLeft':   moveState.left = true; break;
        case 'KeyD': case 'ArrowRight':  moveState.right = true; break;
        case 'KeyE':
            if (isLocked && hoveredObject) {
                openItemPanel(hoveredObject);
            }
            break;
    }
}

// ========== 键盘抬起 ==========
function onKeyUp(event) {
    switch (event.code) {
        case 'KeyW': case 'ArrowUp':    moveState.forward = false; break;
        case 'KeyS': case 'ArrowDown':   moveState.backward = false; break;
        case 'KeyA': case 'ArrowLeft':   moveState.left = false; break;
        case 'KeyD': case 'ArrowRight':  moveState.right = false; break;
    }
}

// ========== 创建光照 ==========
function createLights() {
    // 环境光
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambientLight);

    // 平行光（模拟太阳光，从窗户照入）
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(5, 10, 5);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.width = 2048;
    dirLight.shadow.mapSize.height = 2048;
    dirLight.shadow.camera.near = 0.5;
    dirLight.shadow.camera.far = 30;
    dirLight.shadow.camera.left = -10;
    dirLight.shadow.camera.right = 10;
    dirLight.shadow.camera.top = 10;
    dirLight.shadow.camera.bottom = -10;
    scene.add(dirLight);

    // 教室中央点光源（模拟日光灯）
    const pointLight1 = new THREE.PointLight(0xfff5e6, 0.4, 20);
    pointLight1.position.set(-3, 3.3, 0);
    scene.add(pointLight1);
    const pointLight2 = new THREE.PointLight(0xfff5e6, 0.4, 20);
    pointLight2.position.set(3, 3.3, 0);
    scene.add(pointLight2);
}

// ========== 创建教室 ==========

// ========== 注册可交互物品 ==========
function registerInteractive(group, itemName) {
    interactiveGroups.push(group);
    group.traverse(child => {
        if (child.isMesh) {
            child.userData.itemName = itemName;
            interactiveObjects.push(child);
        }
    });
}

// ========== 碰撞检测（AABB） ==========
function checkCollision(newX, newZ) {
    // 教室边界检测
    if (newX < ROOM_BOUNDS.minX || newX > ROOM_BOUNDS.maxX) return true;
    if (newZ < ROOM_BOUNDS.minZ || newZ > ROOM_BOUNDS.maxZ) return true;

    // 桌子碰撞检测（简化为AABB）
    const deskBoxes = [
        { cx: -3, cz: -1, hw: 0.9, hd: 0.5 },
        { cx: 0, cz: -1, hw: 0.9, hd: 0.5 },
        { cx: 3, cz: -1, hw: 0.9, hd: 0.5 },
        { cx: -3, cz: 1.5, hw: 0.9, hd: 0.5 },
        { cx: 0, cz: 1.5, hw: 0.9, hd: 0.5 },
        { cx: 3, cz: 1.5, hw: 0.9, hd: 0.5 },
    ];
    // 讲台碰撞
    const podiumBox = { cx: 0, cz: -3, hw: 1.35, hd: 0.6 };

    const allObstacles = [...deskBoxes, podiumBox];
    const playerRadius = 0.3;

    for (const box of allObstacles) {
        if (newX + playerRadius > box.cx - box.hw &&
            newX - playerRadius < box.cx + box.hw &&
            newZ + playerRadius > box.cz - box.hd &&
            newZ - playerRadius < box.cz + box.hd) {
            return true;
        }
    }

    return false;
}

// ========== 处理移动 ==========
function handleMovement() {
    if (!isLocked && !isMobile) return;
    if (isPaused || isPanelOpen) return;

    // 获取相机方向
    const direction = new THREE.Vector3();
    camera.getWorldDirection(direction);
    direction.y = 0;
    direction.normalize();

    // 右方向
    const right = new THREE.Vector3();
    right.crossVectors(direction, new THREE.Vector3(0, 1, 0)).normalize();

    // 计算移动向量
    let moveX = 0, moveZ = 0;

    // 键盘输入
    if (moveState.forward)  { moveX += direction.x; moveZ += direction.z; }
    if (moveState.backward) { moveX -= direction.x; moveZ -= direction.z; }
    if (moveState.left)     { moveX -= right.x; moveZ -= right.z; }
    if (moveState.right)    { moveX += right.x; moveZ += right.z; }

    // 手机端摇杆输入
    if (isMobile && joystickLeft.active) {
        moveX += direction.x * (-joystickLeft.dy) + right.x * joystickLeft.dx;
        moveZ += direction.z * (-joystickLeft.dy) + right.z * joystickLeft.dx;
    }

    // 归一化
    const len = Math.sqrt(moveX * moveX + moveZ * moveZ);
    if (len > 0) {
        moveX = (moveX / len) * MOVE_SPEED;
        moveZ = (moveZ / len) * MOVE_SPEED;
    }

    // 尝试移动（分轴碰撞检测，允许沿墙滑动）
    const newX = camera.position.x + moveX;
    const newZ = camera.position.z + moveZ;

    if (!checkCollision(newX, camera.position.z)) {
        camera.position.x = newX;
    }
    if (!checkCollision(camera.position.x, newZ)) {
        camera.position.z = newZ;
    }

    // 保持固定高度
    camera.position.y = PLAYER_HEIGHT;
}

// ========== Raycaster物品检测 ==========
function checkItemFocus() {
    if (!isLocked && !isMobile) return;
    if (isPanelOpen) return;

    raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
    const intersects = raycaster.intersectObjects(interactiveObjects, false);

    const itemLabel = document.getElementById('itemLabel');
    const interactHint = document.getElementById('interactHint');
    const crosshair = document.getElementById('crosshair');
    const mobileBtn = document.getElementById('mobileInteractBtn');

    if (intersects.length > 0) {
        const obj = intersects[0].object;
        const itemName = obj.userData.itemName;

        if (hoveredObject !== obj) {
            // 恢复之前悬停物体
            if (hoveredObject) resetObjectEmissive(hoveredObject);
            hoveredObject = obj;
            // 高亮
            if (obj.material && obj.material.emissive) {
                obj.material.emissive.setHex(0x444444);
            }
        }

        // 显示物品名称
        const itemData = itemsData.find(d => d.name === itemName);
        if (itemData) {
            itemLabel.textContent = itemData.emoji + ' ' + itemData.name;
        } else {
            itemLabel.textContent = itemName;
        }
        itemLabel.classList.add('visible');
        crosshair.classList.add('active');

        // 显示交互提示
        if (isMobile) {
            mobileBtn.classList.add('visible');
            interactHint.classList.remove('visible');
        } else {
            interactHint.classList.add('visible');
            mobileBtn.classList.remove('visible');
        }
    } else {
        if (hoveredObject) {
            resetObjectEmissive(hoveredObject);
            hoveredObject = null;
        }
        itemLabel.classList.remove('visible');
        interactHint.classList.remove('visible');
        crosshair.classList.remove('active');
        mobileBtn.classList.remove('visible');
    }
}

// ========== 自动讲解检测 ==========
function checkAutoNarration() {
    if (isPanelOpen || isPaused) return;

    const playerPos = camera.position;
    let closestItem = null;
    let closestDist = Infinity;

    // 遍历所有交互物品组，找最近的
    interactiveGroups.forEach(group => {
        const itemPos = new THREE.Vector3();
        group.getWorldPosition(itemPos);
        const dist = playerPos.distanceTo(itemPos);
        if (dist < closestDist) {
            closestDist = dist;
            closestItem = group.userData.itemName;
        }
    });

    const narrationBar = document.getElementById('narrationBar');
    const narrationText = document.getElementById('narrationText');

    if (closestDist < 2 && closestItem) {
        // 靠近物品，触发自动讲解
        if (autoNarrateItem !== closestItem) {
            // 切换到新物品
            stopAutoNarration();
            autoNarrateItem = closestItem;
            autoNarrating = true;

            const itemData = itemsData.find(d => d.name === closestItem);
            if (itemData) {
                narrationText.textContent = itemData.emoji + ' ' + itemData.name + '：' + itemData.appearance;
                narrationBar.classList.add('visible');

                // 语音朗读
                const synth = window.speechSynthesis;
                synth.cancel();
                const text = itemData.name + '。' + itemData.appearance + '。' + itemData.func;
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'zh-CN';
                utterance.rate = 0.9;
                utterance.pitch = 1;
                synth.speak(utterance);
            }
        }
    } else if (closestDist > 3) {
        // 走远了，停止讲解
        stopAutoNarration();
    }
}

// ========== 停止自动讲解 ==========
function stopAutoNarration() {
    if (autoNarrating) {
        window.speechSynthesis.cancel();
        autoNarrating = false;
        autoNarrateItem = null;
        document.getElementById('narrationBar').classList.remove('visible');
    }
}

}

// ========== 打开物品讲解面板 ==========
function openItemPanel(obj) {
    const itemName = obj.userData.itemName;
    currentItem = itemsData.find(item => item.name === itemName);
    if (!currentItem) return;

    // 停止自动讲解
    stopAutoNarration();

    // 高亮选中物品
    if (selectedObject) resetObjectEmissive(selectedObject);
    selectedObject = obj;
    if (obj.material && obj.material.emissive) {
        obj.material.emissive.setHex(0x333333);
    }

    // 显示面板
    showPanel(currentItem);
    isPanelOpen = true;

    // 电脑端解锁鼠标
    if (!isMobile && controls.isLocked) {
        controls.unlock();
    }
}

    window.speechSynthesis.cancel();

    btn.classList.remove('speaking');

// ========== 语音朗读 ==========
function speakDescription() {
    if (!currentItem) return;

    const synth = window.speechSynthesis;
    const btn = document.getElementById('btnSpeak');

    if (synth.speaking) {
        synth.cancel();
        btn.classList.remove('speaking');
        btn.innerHTML = '&#128266; 语音朗读';
        return;
    }

    const text = currentItem.name + '。' + currentItem.appearance + '。' + currentItem.func + '。' + currentItem.fun;
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'zh-CN';
    utterance.rate = 0.9;
    utterance.pitch = 1;

    utterance.onstart = () => {
        btn.classList.add('speaking');
        btn.innerHTML = '&#128264; 停止朗读';
    };
    utterance.onend = () => {
        btn.classList.remove('speaking');
        btn.innerHTML = '&#128266; 语音朗读';
    };
    utterance.onerror = () => {
        btn.classList.remove('speaking');
        btn.innerHTML = '&#128266; 语音朗读';
    };

    synth.speak(utterance);
}

// ========== 面板AI问答 ==========
async function sendPanelAi() {
    const input = document.getElementById('panelAiInput');
    const msgContainer = document.getElementById('panelAiMessages');
    const question = input.value.trim();
    if (!question || !currentItem) return;

    const userMsg = document.createElement('div');
    userMsg.className = 'ai-msg user';
    userMsg.textContent = question;
    msgContainer.appendChild(userMsg);
    input.value = '';

    const botMsg = document.createElement('div');
    botMsg.className = 'ai-msg bot';
    botMsg.textContent = '';
    msgContainer.appendChild(botMsg);
    msgContainer.scrollTop = msgContainer.scrollHeight;

    try {
        const response = await fetch('https://api.freegpt4.ddns.net/v1/chat/completions', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                model: 'gpt-4o-mini',
                messages: [
                    {
                        role: 'system',
                        content: '你是一个关于教室物品的科普助手。当前正在查看的物品是"' + currentItem.name + '"（' + currentItem.type + '）。请用简洁生动的中文回答用户的问题。回答控制在100字以内。'
                    },
                    { role: 'user', content: question }
                ],
                max_tokens: 200,
                temperature: 0.7
            })
        });

        if (response.ok) {
            const data = await response.json();
            const answer = data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content ? data.choices[0].message.content : getLocalAnswer(question, currentItem);
            await typeWriter(botMsg, answer);
        } else {
            await typeWriter(botMsg, getLocalAnswer(question, currentItem));
        }
    } catch (e) {
        await typeWriter(botMsg, getLocalAnswer(question, currentItem));
    }

    msgContainer.scrollTop = msgContainer.scrollHeight;
}

// ========== 打字机效果 ==========
function typeWriter(element, text) {
    return new Promise(resolve => {
        let i = 0;
        const speed = 30;
        function type() {
            if (i < text.length) {
                element.textContent += text.charAt(i);
                i++;
                setTimeout(type, speed);
            } else {
                resolve();
            }
        }
        type();
    });
}

// ========== 小地图绘制 ==========
function drawMinimap() {
    const canvas = document.getElementById('minimapCanvas');
    const ctx = canvas.getContext('2d');
    const w = canvas.width, h = canvas.height;

    ctx.clearRect(0, 0, w, h);

    // 教室映射参数（教室16x10 -> 画布156x96）
    const scaleX = w / 16;
    const scaleZ = h / 10;
    const offsetX = w / 2;
    const offsetZ = h / 2;

    // 画教室背景
    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    ctx.fillRect(offsetX - 8 * scaleX, offsetZ - 5 * scaleZ, 16 * scaleX, 10 * scaleZ);

    // 画教室边框
    ctx.strokeStyle = 'rgba(255,255,255,0.25)';
    ctx.lineWidth = 1;
    ctx.strokeRect(offsetX - 8 * scaleX, offsetZ - 5 * scaleZ, 16 * scaleX, 10 * scaleZ);

    // 画门的位置
    ctx.fillStyle = 'rgba(212,168,83,0.5)';
    ctx.fillRect(offsetX + 2 * scaleX - 3, offsetZ + 5 * scaleZ - 3, 6, 4);

    // 画物品位置
    interactiveGroups.forEach(group => {
        const pos = new THREE.Vector3();
        group.getWorldPosition(pos);
        const mx = offsetX + pos.x * scaleX;
        const mz = offsetZ + pos.z * scaleZ;

        ctx.fillStyle = 'rgba(196,30,58,0.6)';
        ctx.beginPath();
        ctx.arc(mx, mz, 2.5, 0, Math.PI * 2);
        ctx.fill();
    });

    // 画玩家位置和方向
    const px = offsetX + camera.position.x * scaleX;
    const pz = offsetZ + camera.position.z * scaleZ;

    // 玩家方向
    const dir = new THREE.Vector3();
    camera.getWorldDirection(dir);
    const angle = Math.atan2(dir.x, dir.z);

    ctx.save();
    ctx.translate(px, pz);
    ctx.rotate(-angle);

    // 方向三角形
    ctx.fillStyle = '#d4a853';
    ctx.beginPath();
    ctx.moveTo(0, -6);
    ctx.lineTo(-4, 4);
    ctx.lineTo(4, 4);
    ctx.closePath();
    ctx.fill();

    ctx.restore();

    // 玩家圆点
    ctx.fillStyle = '#d4a853';
    ctx.beginPath();
    ctx.arc(px, pz, 3, 0, Math.PI * 2);
    ctx.fill();
}

// ========== 手机端虚拟摇杆 ==========
function setupMobileControls() {
    const leftZone = document.getElementById('joystickLeftZone');
    const rightZone = document.getElementById('joystickRightZone');
    const leftBase = document.getElementById('joystickLeftBase');
    const leftThumb = document.getElementById('joystickLeftThumb');
    const rightBase = document.getElementById('joystickRightBase');
    const rightThumb = document.getElementById('joystickRightThumb');
    const interactBtn = document.getElementById('mobileInteractBtn');

    const JOYSTICK_RADIUS = 50;
    const THUMB_MAX = 35;

    // 左摇杆（移动）
    leftZone.addEventListener('touchstart', (e) => {
        e.preventDefault();
        const touch = e.changedTouches[0];
        joystickLeft.active = true;
        joystickLeft.touchId = touch.identifier;

        const rect = leftZone.getBoundingClientRect();
        const cx = rect.left + rect.width / 2;
        const cy = rect.top + rect.height / 2;

        leftBase.style.display = 'block';
        leftBase.style.left = (cx - JOYSTICK_RADIUS) + 'px';
        leftBase.style.top = (cy - JOYSTICK_RADIUS) + 'px';
        leftThumb.style.display = 'block';
        leftThumb.style.left = (cx - 25) + 'px';
        leftThumb.style.top = (cy - 25) + 'px';
    }, { passive: false });

    leftZone.addEventListener('touchmove', (e) => {
        e.preventDefault();
        for (const touch of e.changedTouches) {
            if (touch.identifier === joystickLeft.touchId) {
                const rect = leftBase.getBoundingClientRect();
                const bcx = rect.left + JOYSTICK_RADIUS;
                const bcy = rect.top + JOYSTICK_RADIUS;

                let dx = touch.clientX - bcx;
                let dy = touch.clientY - bcy;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist > THUMB_MAX) {
                    dx = (dx / dist) * THUMB_MAX;
                    dy = (dy / dist) * THUMB_MAX;
                }

                joystickLeft.dx = dx / THUMB_MAX;
                joystickLeft.dy = dy / THUMB_MAX;

                leftThumb.style.left = (bcx + dx - 25) + 'px';
                leftThumb.style.top = (bcy + dy - 25) + 'px';
            }
        }
    }, { passive: false });

    leftZone.addEventListener('touchend', (e) => {
        for (const touch of e.changedTouches) {
            if (touch.identifier === joystickLeft.touchId) {
                joystickLeft.active = false;
                joystickLeft.dx = 0;
                joystickLeft.dy = 0;
                joystickLeft.touchId = null;
                leftBase.style.display = 'none';
                leftThumb.style.display = 'none';
            }
        }
    });

    // 右摇杆（视角）
    let rightStartX = 0, rightStartY = 0;
    let cameraEulerX = 0, cameraEulerY = 0;

    rightZone.addEventListener('touchstart', (e) => {
        e.preventDefault();
        const touch = e.changedTouches[0];
        joystickRight.active = true;
        joystickRight.touchId = touch.identifier;
        rightStartX = touch.clientX;
        rightStartY = touch.clientY;

        // 获取当前相机旋转
        cameraEulerX = camera.rotation.x;
        cameraEulerY = camera.rotation.y;

        const rect = rightZone.getBoundingClientRect();
        const cx = rect.left + rect.width / 2;
        const cy = rect.top + rect.height / 2;

        rightBase.style.display = 'block';
        rightBase.style.left = (cx - JOYSTICK_RADIUS) + 'px';
        rightBase.style.top = (cy - JOYSTICK_RADIUS) + 'px';
        rightThumb.style.display = 'block';
        rightThumb.style.left = (cx - 25) + 'px';
        rightThumb.style.top = (cy - 25) + 'px';
    }, { passive: false });

    rightZone.addEventListener('touchmove', (e) => {
        e.preventDefault();
        for (const touch of e.changedTouches) {
            if (touch.identifier === joystickRight.touchId) {
                const dx = touch.clientX - rightStartX;
                const dy = touch.clientY - rightStartY;

                // 水平旋转
                camera.rotation.y = cameraEulerY - dx * 0.004;
                // 垂直旋转（限制角度）
                let newPitch = cameraEulerX - dy * 0.004;
                const minPitch = -Math.PI / 3;   // -60度
                const maxPitch = Math.PI * 80 / 180; // +80度
                newPitch = Math.max(minPitch, Math.min(maxPitch, newPitch));
                camera.rotation.x = newPitch;

                // 更新摇杆视觉
                const rect = rightBase.getBoundingClientRect();
                const bcx = rect.left + JOYSTICK_RADIUS;
                const bcy = rect.top + JOYSTICK_RADIUS;

                let jdx = dx * 0.3;
                let jdy = dy * 0.3;
                const jdist = Math.sqrt(jdx * jdx + jdy * jdy);
                if (jdist > THUMB_MAX) {
                    jdx = (jdx / jdist) * THUMB_MAX;
                    jdy = (jdy / jdist) * THUMB_MAX;
                }

                rightThumb.style.left = (bcx + jdx - 25) + 'px';
                rightThumb.style.top = (bcy + jdy - 25) + 'px';
            }
        }
    }, { passive: false });

    rightZone.addEventListener('touchend', (e) => {
        for (const touch of e.changedTouches) {
            if (touch.identifier === joystickRight.touchId) {
                joystickRight.active = false;
                joystickRight.touchId = null;
                rightBase.style.display = 'none';
                rightThumb.style.display = 'none';
            }
        }
    });

    // 手机端交互按钮
    interactBtn.addEventListener('click', () => {
        if (hoveredObject) {
            openItemPanel(hoveredObject);
        }
    });
}

// ========== 窗口大小变化 ==========
function onWindowResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}

// ========== 渲染循环 ==========
function animate() {
    requestAnimationFrame(animate);

    // 处理移动
    handleMovement();

    // 检测准星对准的物品
    checkItemFocus();

    // 检测自动讲解
    checkAutoNarration();

    // 绘制小地图
    if (isPlaying) {
        drawMinimap();
    }

    // 渲染
    renderer.render(scene, camera);
}

// ========== 启动 ==========
window.addEventListener('DOMContentLoaded', init);
</script>
