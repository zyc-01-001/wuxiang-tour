<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D场景导览演示 - 武乡红色文旅</title>
    <style>
        /* ========== 全局重置与变量 ========== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #0a0a0a;
            --red-primary: #c41e3a;
            --red-dark: #9a1830;
            --gold-accent: #d4a853;
            --gold-light: #e8c87a;
            --text-primary: #ffffff;
            --text-secondary: rgba(255,255,255,0.7);
            --text-muted: rgba(255,255,255,0.45);
            --border-subtle: rgba(255,255,255,0.08);
            --radius-sm: 8px;
            --radius-md: 12px;
        }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Noto Sans SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
        }
        a { color: inherit; text-decoration: none; }

        /* ========== 加载进度条 ========== */
        .loading-bar-container {
            position: fixed; top: 0; left: 0; right: 0;
            height: 4px; background: rgba(255,255,255,0.05);
            z-index: 100000;
        }
        .loading-bar {
            height: 100%; width: 0%;
            background: linear-gradient(90deg, var(--red-primary), var(--gold-accent));
            transition: width 0.3s ease;
        }
        .loading-overlay {
            position: fixed; inset: 0;
            background: var(--bg-primary);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 99999;
            transition: opacity 0.6s ease, visibility 0.6s ease;
        }
        .loading-overlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        .loader-ring {
            width: 50px; height: 50px;
            border: 3px solid rgba(196,30,58,0.15);
            border-top-color: var(--red-primary);
            border-right-color: var(--gold-accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        .loader-text {
            font-size: 14px; color: var(--text-muted);
            letter-spacing: 3px;
        }
        .loader-percent {
            font-size: 28px; font-weight: 700;
            color: var(--gold-accent);
            margin-bottom: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ========== 顶部导航 ========== */
        .top-nav {
            position: fixed; top: 0; left: 0; right: 0;
            height: 56px;
            background: rgba(10,10,10,0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-subtle);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px;
            z-index: 1000;
        }
        .top-nav a, .top-nav span {
            font-size: 14px; color: var(--text-secondary);
            transition: color 0.3s;
        }
        .top-nav a:hover { color: var(--gold-accent); }
        .top-nav .nav-title {
            font-size: 16px; font-weight: 600;
            color: var(--text-primary);
            letter-spacing: 1px;
        }
        .top-nav .nav-back {
            display: flex; align-items: center; gap: 6px;
        }

        /* ========== 3D画布容器 ========== */
        #scene-container {
            width: 100%; height: 100%;
            position: fixed; top: 0; left: 0;
        }
        #scene-container canvas { display: block; }

        /* ========== 物品名称悬浮标签 ========== */
        .hover-label {
            position: fixed;
            padding: 6px 14px;
            background: rgba(10,10,10,0.9);
            border: 1px solid var(--gold-accent);
            border-radius: var(--radius-sm);
            font-size: 13px;
            color: var(--gold-light);
            pointer-events: none;
            z-index: 500;
            opacity: 0;
            transition: opacity 0.2s;
            white-space: nowrap;
            backdrop-filter: blur(8px);
        }
        .hover-label.visible { opacity: 1; }

        /* ========== 讲解面板 ========== */
        .info-panel {
            position: fixed; top: 0; right: 0;
            width: 400px; height: 100vh;
            background: rgba(10,10,10,0.95);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-left: 1px solid rgba(212,168,83,0.2);
            z-index: 2000;
            transform: translateX(100%);
            transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
            overflow-y: auto;
            display: flex; flex-direction: column;
        }
        .info-panel.open { transform: translateX(0); }

        .panel-header {
            padding: 20px 24px 16px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            display: flex; align-items: center; justify-content: space-between;
            flex-shrink: 0;
        }
        .panel-header h3 {
            font-size: 20px; font-weight: 700;
            display: flex; align-items: center; gap: 10px;
        }
        .panel-close {
            width: 36px; height: 36px;
            border-radius: 50%;
            background: rgba(255,255,255,0.06);
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .panel-close:hover { background: rgba(196,30,58,0.3); }

        .panel-body {
            padding: 20px 24px;
            flex: 1;
            overflow-y: auto;
        }

        .panel-section {
            margin-bottom: 20px;
        }
        .panel-section-title {
            font-size: 11px; font-weight: 600;
            color: var(--red-primary);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 8px;
            display: flex; align-items: center; gap: 6px;
        }
        .panel-section-title::before {
            content: ''; width: 12px; height: 2px;
            background: var(--red-primary);
        }
        .panel-section p {
            font-size: 14px; line-height: 1.8;
            color: var(--text-secondary);
        }

        .panel-tag {
            display: inline-block;
            padding: 3px 10px;
            background: rgba(196,30,58,0.15);
            border: 1px solid rgba(196,30,58,0.3);
            border-radius: 20px;
            font-size: 12px;
            color: var(--red-primary);
            margin-bottom: 16px;
        }

        /* 语音朗读按钮 */
        .btn-speak {
            display: flex; align-items: center; gap: 8px;
            padding: 10px 20px;
            background: linear-gradient(135deg, var(--red-primary), var(--red-dark));
            border-radius: var(--radius-sm);
            color: #fff;
            font-size: 14px;
            cursor: pointer;
            border: none;
            transition: opacity 0.3s, transform 0.2s;
            width: 100%;
            justify-content: center;
        }
        .btn-speak:hover { opacity: 0.9; }
        .btn-speak:active { transform: scale(0.98); }
        .btn-speak.speaking {
            animation: pulse-speak 1.5s infinite;
        }
        @keyframes pulse-speak {
            0%, 100% { box-shadow: 0 0 0 0 rgba(196,30,58,0.4); }
            50% { box-shadow: 0 0 0 10px rgba(196,30,58,0); }
        }

        /* AI问答区域 */
        .panel-ai {
            border-top: 1px solid rgba(255,255,255,0.06);
            padding: 16px 24px 20px;
            flex-shrink: 0;
        }
        .panel-ai-title {
            font-size: 12px; color: var(--text-muted);
            margin-bottom: 10px;
            display: flex; align-items: center; gap: 6px;
        }
        .ai-chat-messages {
            max-height: 150px;
            overflow-y: auto;
            margin-bottom: 10px;
            font-size: 13px;
            line-height: 1.7;
        }
        .ai-chat-messages::-webkit-scrollbar { width: 4px; }
        .ai-chat-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
        .ai-msg {
            padding: 8px 12px;
            border-radius: var(--radius-sm);
            margin-bottom: 8px;
            max-width: 95%;
        }
        .ai-msg.bot {
            background: rgba(255,255,255,0.04);
            color: var(--text-secondary);
        }
        .ai-msg.user {
            background: rgba(196,30,58,0.15);
            color: var(--text-primary);
            margin-left: auto;
            text-align: right;
        }
        .ai-input-row {
            display: flex; gap: 8px;
        }
        .ai-input-row input {
            flex: 1;
            padding: 8px 14px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-size: 13px;
            outline: none;
            transition: border-color 0.3s;
        }
        .ai-input-row input:focus { border-color: var(--gold-accent); }
        .ai-input-row button {
            padding: 8px 16px;
            background: var(--red-primary);
            border-radius: var(--radius-sm);
            color: #fff;
            font-size: 13px;
            cursor: pointer;
            border: none;
            white-space: nowrap;
            transition: background 0.3s;
        }
        .ai-input-row button:hover { background: var(--red-dark); }

        /* ========== 操作提示 ========== */
        .controls-hint {
            position: fixed; bottom: 20px; left: 50%;
            transform: translateX(-50%);
            padding: 8px 20px;
            background: rgba(10,10,10,0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            font-size: 12px;
            color: var(--text-muted);
            z-index: 500;
            pointer-events: none;
            opacity: 1;
            transition: opacity 1s ease 3s;
        }
        .controls-hint.fade { opacity: 0; }

        /* ========== 响应式 ========== */
        @media (max-width: 768px) {
            .info-panel {
                width: 100%;
            }
            .top-nav .nav-brand { display: none; }
        }
    </style>
</head>
<body>

<!-- ========== 加载界面 ========== -->
<div class="loading-overlay" id="loadingOverlay">
    <div class="loader-ring"></div>
    <div class="loader-percent" id="loaderPercent">0%</div>
    <div class="loader-text">正在加载3D场景...</div>
</div>
<div class="loading-bar-container">
    <div class="loading-bar" id="loadingBar"></div>
</div>

<!-- ========== 顶部导航 ========== -->
<nav class="top-nav">
    <a href="index.html" class="nav-back">&larr; 返回主站</a>
    <span class="nav-title">3D场景导览演示</span>
    <span class="nav-brand">武乡红色文旅</span>
</nav>

<!-- ========== 3D场景容器 ========== -->
<div id="scene-container"></div>

<!-- ========== 悬浮标签 ========== -->
<div class="hover-label" id="hoverLabel"></div>

<!-- ========== 讲解面板 ========== -->
<div class="info-panel" id="infoPanel">
    <div class="panel-header">
        <h3 id="panelTitle"></h3>
        <div class="panel-close" id="panelClose">&times;</div>
    </div>
    <div class="panel-body">
        <div class="panel-tag" id="panelTag"></div>

        <div class="panel-section">
            <div class="panel-section-title">外观描述</div>
            <p id="panelAppearance"></p>
        </div>

        <div class="panel-section">
            <div class="panel-section-title">功能用途</div>
            <p id="panelFunction"></p>
        </div>

        <div class="panel-section">
            <div class="panel-section-title">趣味知识</div>
            <p id="panelFun"></p>
        </div>

        <button class="btn-speak" id="btnSpeak" onclick="speakDescription()">
            &#128266; 语音朗读
        </button>
    </div>

    <!-- AI问答 -->
    <div class="panel-ai">
        <div class="panel-ai-title">&#129302; AI智能问答</div>
        <div class="ai-chat-messages" id="panelAiMessages"></div>
        <div class="ai-input-row">
            <input type="text" id="panelAiInput" placeholder="关于此物品的问题..." onkeydown="if(event.key==='Enter')sendPanelAi()">
            <button onclick="sendPanelAi()">发送</button>
        </div>
    </div>
</div>

<!-- ========== 操作提示 ========== -->
<div class="controls-hint" id="controlsHint">
    &#128433; 鼠标左键旋转 &nbsp;|&nbsp; 滚轮缩放 &nbsp;|&nbsp; 右键平移 &nbsp;|&nbsp; 点击物品查看详情
</div>

<!-- ========== Three.js CDN ========== -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

        fun: '人类每天需要摄入约1500-2000毫升的水。有趣的是，地球上的水有97%是海水，只有不到1%的淡水可供人类直接使用，所以珍惜每一滴水非常重要！'
    },
    {
        name: '椅子',
        emoji: '\uD83E\uDE91',
        type: '家具',
        appearance: '蓝色座椅配靠背的学生椅，座面为略带弧度的方形设计，靠背微微向后倾斜符合人体工学。四条金属腿支撑稳固，底部带有防滑脚垫。',
        function: '提供舒适的就坐支撑，让学生在长时间学习中保持良好的坐姿。合适的椅子能够有效减轻腰部和背部的疲劳感，保护脊椎健康。',
        fun: '最早的椅子可以追溯到古埃及和古希腊时期，但当时只有贵族才能坐椅子，普通人都是坐在地上或凳子上。直到中世纪，椅子才开始在普通家庭中普及。'
    },
    {
        name: '课桌',
        emoji: '\uD83D\uDCDA',
        type: '家具',
        appearance: '棕色木质课桌，桌面平整宽敞，长约120厘米，宽约60厘米。桌面下方设有书架和抽屉，用于存放课本和文具。四条桌腿稳固支撑。',
        function: '为学生提供学习和书写的工作台面。课桌是教室中最基本的家具，承载着学生的课本、文具、笔记本等学习用品，是学习活动的主要场所。',

        function: '调节教室内的温度和湿度，在炎热的夏天提供凉爽的学习环境，在寒冷的冬天提供温暖。良好的温度环境有助于学生保持舒适，提高学习效率。',
        fun: '1902年，美国人威利斯·开利发明了第一台现代空调系统，最初是为了控制印刷厂的湿度。没想到这个发明彻底改变了人类的生活方式，让人们在酷暑中也能享受清凉。'
    },
    {
        name: '黑板',

        function: '教师用来书写教学内容、板书重点知识、绘制图表和示意图等。黑板是课堂教学中最传统也最重要的展示工具，能够直观地呈现教学信息。',
        fun: '黑板最早出现在19世纪初，由苏格兰地理学家詹姆斯·皮尔安发明。有趣的是，他发明黑板是因为纸太贵了！在此之前，学生们用的是各自的小石板。绿色的黑板比传统的黑色黑板更护眼。'
    },
    {
        name: '窗户',
        emoji: '\uD83E\uDEA9',

        appearance: '浅蓝色半透明玻璃窗户，镶嵌在教室后方的墙壁上。每扇窗户由铝合金边框固定，可以推拉开合。透过窗户可以看到室外的蓝天白云。',
        function: '为教室提供自然采光和通风换气。充足的自然光线有助于保护学生视力，新鲜空气则能保持教室内空气流通，创造健康舒适的学习环境。',

        function: '教师授课时使用的工作台，用于放置教学资料和物品。讲台也是教师组织课堂教学、与学生互动的重要位置，象征着教师的教学权威。',
        fun: '在中国古代，老师讲课的地方叫做"讲席"，学生要席地而坐聆听。古代最著名的讲台当属孔子在杏坛讲学的地方。现在的"杏坛"已经成为教育圣地的一种象征。'
    }
];

// ========== 全局变量 ==========
let scene, camera, renderer, controls;
let raycaster, mouse;
let interactiveObjects = []; // 可交互的3D物体数组
let hoveredObject = null;
let selectedObject = null;
let currentItem = null;

// ========== 加载进度模拟 ==========
let loadProgress = 0;
function updateLoading(progress) {
    loadProgress = Math.min(progress, 100);
    document.getElementById('loadingBar').style.width = loadProgress + '%';
    document.getElementById('loaderPercent').textContent = Math.floor(loadProgress) + '%';
    if (loadProgress >= 100) {
        setTimeout(() => {
            document.getElementById('loadingOverlay').classList.add('hidden');
            document.querySelector('.loading-bar-container').style.display = 'none';
        }, 400);
    }
}

// ========== 初始化场景 ==========
function init() {
    updateLoading(10);

    // 创建场景
    scene = new THREE.Scene();
    // 渐变天空背景
    scene.background = new THREE.Color(0x87CEEB);
    scene.fog = new THREE.Fog(0x87CEEB, 25, 50);

    updateLoading(20);

    // 创建相机
    camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 8, 12);
    camera.lookAt(0, 0, 0);

    updateLoading(30);

    // 创建渲染器
    renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    document.getElementById('scene-container').appendChild(renderer.domElement);

    updateLoading(40);

    // 轨道控制器
    controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.minDistance = 5;
    controls.maxDistance = 20;
    controls.maxPolarAngle = Math.PI / 2.2;
    controls.target.set(0, 1, 0);

    updateLoading(50);

    // 射线投射器（用于鼠标交互）
    raycaster = new THREE.Raycaster();
    mouse = new THREE.Vector2();

    // 创建光照
    createLights();
    updateLoading(60);

    // 创建教室
    createClassroom();
    updateLoading(85);

    // 事件监听
    window.addEventListener('resize', onWindowResize);
    renderer.domElement.addEventListener('mousemove', onMouseMove);
    renderer.domElement.addEventListener('click', onMouseClick);
    document.getElementById('panelClose').addEventListener('click', closePanel);

    // 3秒后隐藏操作提示
    setTimeout(() => {
        document.getElementById('controlsHint').classList.add('fade');
    }, 100);

    updateLoading(100);

    // 开始渲染循环
    animate();
}

// ========== 鼠标移动（悬停检测） ==========
function onMouseMove(event) {
    // 计算鼠标归一化坐标
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(interactiveObjects, false);

    const label = document.getElementById('hoverLabel');

    if (intersects.length > 0) {
        const obj = intersects[0].object;
        const itemName = obj.userData.itemName;

        if (hoveredObject !== obj) {
            // 恢复之前悬停物体
            if (hoveredObject && hoveredObject !== selectedObject) {
                resetObjectEmissive(hoveredObject);
            }
            hoveredObject = obj;
            // 高亮
            if (obj.material && obj.material.emissive) {
                obj.material.emissive.setHex(0x333333);
            }
        }

        // 显示标签
        label.textContent = itemName;
        label.style.left = (event.clientX + 15) + 'px';
        label.style.top = (event.clientY - 10) + 'px';
        label.classList.add('visible');
        renderer.domElement.style.cursor = 'pointer';
    } else {
        if (hoveredObject && hoveredObject !== selectedObject) {
            resetObjectEmissive(hoveredObject);
        }
        hoveredObject = null;
        label.classList.remove('visible');
        renderer.domElement.style.cursor = 'grab';
    }
}

// ========== 重置物体发光 ==========
function resetObjectEmissive(obj) {
    if (obj.material && obj.material.emissive) {
        obj.material.emissive.setHex(0x000000);
    }
}

// ========== 鼠标点击 ==========
function onMouseClick(event) {
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(interactiveObjects, false);

    if (intersects.length > 0) {
        const obj = intersects[0].object;
        const itemName = obj.userData.itemName;

        // 恢复之前选中的物体
        if (selectedObject) {
            resetObjectEmissive(selectedObject);
        }

        selectedObject = obj;

        // 高亮闪烁效果
        flashObject(obj);

        // 查找物品数据
        currentItem = itemsData.find(item => item.name === itemName);
        if (currentItem) {
            showPanel(currentItem);
        }
    }
}

// ========== 高亮闪烁效果 ==========
function flashObject(obj) {
    if (!obj.material || !obj.material.emissive) return;

    let flashCount = 0;
    const flashInterval = setInterval(() => {
        if (flashCount % 2 === 0) {
            obj.material.emissive.setHex(0x555555);
        } else {
            obj.material.emissive.setHex(0x111111);
        }
        flashCount++;
        if (flashCount >= 6) {
            clearInterval(flashInterval);
            obj.material.emissive.setHex(0x222222); // 保持微弱高亮
        }
    }, 100);
}

// ========== 显示讲解面板 ==========
function showPanel(item) {
    document.getElementById('panelTitle').textContent = item.emoji + ' ' + item.name;
    document.getElementById('panelTag').textContent = item.type;
    document.getElementById('panelAppearance').textContent = item.appearance;
    document.getElementById('panelFunction').textContent = item.function;
    document.getElementById('panelFun').textContent = item.fun;

    // 清空AI对话
    document.getElementById('panelAiMessages').innerHTML = '';
    document.getElementById('panelAiInput').value = '';

    // 重置语音按钮
    const btn = document.getElementById('btnSpeak');
    btn.classList.remove('speaking');
    btn.innerHTML = '&#128266; 语音朗读';

    // 打开面板
    document.getElementById('infoPanel').classList.add('open');
}

// ========== 关闭面板 ==========
function closePanel() {
    document.getElementById('infoPanel').classList.remove('open');
    if (selectedObject) {
        resetObjectEmissive(selectedObject);
        selectedObject = null;
    }
    // 停止语音
    window.speechSynthesis.cancel();
    const btn = document.getElementById('btnSpeak');
    btn.classList.remove('speaking');
    btn.innerHTML = '&#128266; 语音朗读';
}

// ========== 语音朗读 ==========
function speakDescription() {
    if (!currentItem) return;

    const synth = window.speechSynthesis;
    const btn = document.getElementById('btnSpeak');

    // 如果正在朗读，则停止
    if (synth.speaking) {
        synth.cancel();
        btn.classList.remove('speaking');
        btn.innerHTML = '&#128266; 语音朗读';
        return;
    }

    // 组合朗读文本
    const text = `${currentItem.name}。${currentItem.appearance}。${currentItem.function}。${currentItem.fun}`;

    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'zh-CN';
    utterance.rate = 0.9;
    utterance.pitch = 1;

    utterance.onstart = () => {
        btn.classList.add('speaking');
        btn.innerHTML = '&#128264; 停止朗读';
    };
    utterance.onend = () => {
        btn.classList.remove('speaking');
        btn.innerHTML = '&#128266; 语音朗读';
    };
    utterance.onerror = () => {
        btn.classList.remove('speaking');
        btn.innerHTML = '&#128266; 语音朗读';
    };

    synth.speak(utterance);
}

// ========== 面板AI问答 ==========
async function sendPanelAi() {
    const input = document.getElementById('panelAiInput');
    const msgContainer = document.getElementById('panelAiMessages');
    const question = input.value.trim();
    if (!question || !currentItem) return;

    // 添加用户消息
    const userMsg = document.createElement('div');
    userMsg.className = 'ai-msg user';
    userMsg.textContent = question;
    msgContainer.appendChild(userMsg);
    input.value = '';

    // 添加AI回复占位
    const botMsg = document.createElement('div');
    botMsg.className = 'ai-msg bot';
    botMsg.textContent = '';
    msgContainer.appendChild(botMsg);
    msgContainer.scrollTop = msgContainer.scrollHeight;

    try {
        // 调用免费API
        const response = await fetch('https://api.freegpt4.ddns.net/v1/chat/completions', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                model: 'gpt-4o-mini',
                messages: [
                    {
                        role: 'system',
                        content: `你是一个关于教室物品的科普助手。当前正在查看的物品是"${currentItem.name}"（${currentItem.type}）。请用简洁生动的中文回答用户的问题。回答控制在100字以内。`
                    },
                    { role: 'user', content: question }
                ],
                max_tokens: 200,
                temperature: 0.7
            })
        });

        if (response.ok) {
            const data = await response.json();
            const answer = data.choices?.[0]?.message?.content || getLocalAnswer(question, currentItem);
            await typeWriter(botMsg, answer);
        } else {
            await typeWriter(botMsg, getLocalAnswer(question, currentItem));
        }
    } catch (e) {
        await typeWriter(botMsg, getLocalAnswer(question, currentItem));
    }

    msgContainer.scrollTop = msgContainer.scrollHeight;
}

// ========== 打字机效果 ==========
function typeWriter(element, text) {
    return new Promise(resolve => {
        let i = 0;
        const speed = 30;
        function type() {
            if (i < text.length) {
                element.textContent += text.charAt(i);
                i++;
                setTimeout(type, speed);
            } else {
                resolve();
            }
        }
        type();
    });
}

// ========== 窗口大小变化 ==========
function onWindowResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}

// ========== 渲染循环 ==========
function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
}

// ========== 启动 ==========
window.addEventListener('DOMContentLoaded', init);
